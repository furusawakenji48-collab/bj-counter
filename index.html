<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>BJ Counter</title>

  <style>
    body {
      background: #111;
      color: white;
      font-family: Arial, sans-serif;
      text-align: center;
      margin: 0;
      padding: 20px;
    }

    h1 {
      margin-bottom: 10px;
    }

    .count {
      font-size: 40px;
      margin: 20px 0;
      font-weight: bold;
    }

    .buttons {
      display: grid;
      grid-template-columns: repeat(5, 1fr);
      gap: 10px;
      max-width: 600px;
      margin: auto;
    }

    button {
      padding: 20px;
      font-size: 22px;
      border: none;
      border-radius: 12px;
      background: #222;
      color: white;
      cursor: pointer;
    }

    button:hover {
      background: #333;
    }

    .reset {
      margin-top: 20px;
      background: #aa0000;
    }

    table {
      width: 100%;
      max-width: 700px;
      margin: 30px auto;
      border-collapse: collapse;
      background: #1a1a1a;
    }

    th, td {
      border: 1px solid #333;
      padding: 10px;
      font-size: 18px;
    }

    th {
      background: #222;
    }
  </style>
</head>
<body>

  <h1>Blackjack Counter</h1>

  <div class="count" id="count">0</div>

  <div class="buttons" id="buttons"></div>

  <button class="reset" onclick="resetGame()">RESET</button>

  <table>
    <thead>
      <tr>
        <th>カード</th>
        <th>残り枚数</th>
        <th>残り割合</th>
      </tr>
    </thead>
    <tbody id="cardTable"></tbody>
  </table>

<script>
  let runningCount = 0;

  const cardCounts = {
    'A': 24,
    '2': 24,
    '3': 24,
    '4': 24,
    '5': 24,
    '6': 24,
    '7': 24,
    '8': 24,
    '9': 24,
    '10': 96
  };

  const values = {
    '2': 1,
    '3': 1,
    '4': 1,
    '5': 1,
    '6': 1,
    '7': 0,
    '8': 0,
    '9': 0,
    '10': -1,
    'A': -1
  };

  const clickSound = new Audio('https://assets.mixkit.co/active_storage/sfx/2571/2571-preview.mp3');
  clickSound.volume = 1.0;

  function playSound() {
    clickSound.currentTime = 0;
    clickSound.play();
  }

  function totalCardsLeft() {
    return Object.values(cardCounts).reduce((a, b) => a + b, 0);
  }

  function updateDisplay() {
    document.getElementById('count').innerText = runningCount;

    const table = document.getElementById('cardTable');
    table.innerHTML = '';

    const total = totalCardsLeft();

    for (const key in cardCounts) {
      const percent = ((cardCounts[key] / total) * 100).toFixed(1);

      table.innerHTML += `
        <tr>
          <td>${key}</td>
          <td>${cardCounts[key]}</td>
          <td>${percent}%</td>
        </tr>
      `;
    }
  }

  function pressCard(card) {
    if (cardCounts[card] <= 0) return;

    playSound();

    runningCount += values[card];

    cardCounts[card]--;

    updateDisplay();
  }

  function resetGame() {
    playSound();

    runningCount = 0;

    for (const key in cardCounts) {
      if (key === '10') {
        cardCounts[key] = 96;
      } else {
        cardCounts[key] = 24;
      }
    }

    updateDisplay();
  }

  const buttonsDiv = document.getElementById('buttons');

  Object.keys(cardCounts).forEach(card => {
    const btn = document.createElement('button');
    btn.innerText = card;
    btn.onclick = () => pressCard(card);
    buttonsDiv.appendChild(btn);
  });

  updateDisplay();
</script>

</body>
</html>
